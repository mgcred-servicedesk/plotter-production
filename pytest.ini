[pytest]
# Configuração do pytest para o projeto

# Diretório de testes
testpaths = tests

# Padrão de arquivos de teste
python_files = test_*.py

# Padrão de classes de teste
python_classes = Test*

# Padrão de funções de teste
python_functions = test_*

# Opções padrão
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers personalizados
markers =
    unit: Testes unitários rápidos
    integration: Testes de integração com dados reais
    slow: Testes que demoram mais tempo
    data_validation: Testes de validação de dados
