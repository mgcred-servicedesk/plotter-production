# Paleta OKLCH aproximada em hex — Streamlit native nao suporta oklch()
# Fase 1: warm neutrals (light) + warm black (dark), accent azul neutro

[theme]
primaryColor="#3366E6"
backgroundColor="#FAFAF9"
secondaryBackgroundColor="#FFFFFF"
textColor="#1F2937"

[theme.light]
primaryColor="#3366E6"
backgroundColor="#FAFAF9"
secondaryBackgroundColor="#FFFFFF"
textColor="#1F2937"

[theme.dark]
primaryColor="#5C8FF7"
backgroundColor="#0A0A0B"
secondaryBackgroundColor="#141416"
textColor="#F5F4F2"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[logger]
level = "info"
