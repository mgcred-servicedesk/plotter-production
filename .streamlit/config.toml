# Configuracao do Streamlit para deploy no Streamlit Cloud

[theme]
font = "sans serif"
primaryColor = "#2563EB"
backgroundColor = "#E8EDF3"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#0F172A"

[server]
headless = true
enableCORS = false

[browser]
gatherUsageStats = false

[logger]
level = "info"
